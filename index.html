<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2a2a2a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background-color: #3a3a3a;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Scrolling Ticker */
        .ticker-wrapper {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 15px 0;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid #555;
        }

        .ticker {
            display: flex;
            white-space: nowrap;
            animation: scrollTicker 30s linear infinite;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 30px;
            color: #00ffaa;
        }

        .ticker-item span {
            color: #ffaa00;
        }

        @keyframes scrollTicker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker:hover {
            animation-play-state: paused;
        }

        /* Time Cards */
        .time-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .time-card {
            flex: 1;
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #555;
        }

        .time-label {
            font-size: 1rem;
            color: #aaa;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .time-value {
            font-size: 2rem;
            font-weight: bold;
            color: #00ffaa;
            font-family: monospace;
        }

        /* Date Card */
        .date-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #555;
        }

        .date-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffaa00;
        }

        /* Counter */
        .counter-section {
            text-align: center;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 15px;
            border: 1px solid #555;
        }

        .counter-label {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .counter-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ffaa;
            font-family: monospace;
        }

        .credit {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Scrolling Crypto Ticker -->
    <div class="ticker-wrapper">
        <div class="ticker" id="ticker">
            Loading crypto prices...
        </div>
    </div>

    <!-- Time Section -->
    <div class="time-section">
        <div class="time-card">
            <div class="time-label">UTC TIME</div>
            <div class="time-value" id="utcTime">--:--:--</div>
        </div>
        <div class="time-card">
            <div class="time-label">UTC+8 (MY/SG/CN)</div>
            <div class="time-value" id="utc8Time">--:--:--</div>
        </div>
    </div>

    <!-- Local Date -->
    <div class="date-card">
        <div class="time-label">LOCAL DATE</div>
        <div class="date-value" id="localDate">Loading...</div>
    </div>

    <!-- Page View Counter -->
    <div class="counter-section">
        <div class="counter-label">📈 PAGE VIEWS</div>
        <div class="counter-value" id="counter">...</div>
    </div>
    <div class="credit">Live Crypto Data • Auto Updates</div>
</div>

<script>
    // ==================== CRYPTO TICKER ====================
    async function fetchCryptoPrices() {
        try {
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,cardano,dogecoin&vs_currencies=usd');
            const data = await response.json();
            
            const prices = [
                { name: 'BTC', price: data.bitcoin?.usd || 'N/A' },
                { name: 'ETH', price: data.ethereum?.usd || 'N/A' },
                { name: 'SOL', price: data.solana?.usd || 'N/A' },
                { name: 'ADA', price: data.cardano?.usd || 'N/A' },
                { name: 'DOGE', price: data.dogecoin?.usd || 'N/A' }
            ];
            
            // Create scrolling content (duplicate for seamless loop)
            let tickerHTML = '';
            for (let i = 0; i < 3; i++) { // Triple for smooth looping
                prices.forEach(p => {
                    tickerHTML += `<div class="ticker-item">${p.name}: <span>$${p.price.toLocaleString()}</span></div>`;
                });
            }
            document.getElementById('ticker').innerHTML = tickerHTML;
        } catch (error) {
            document.getElementById('ticker').innerHTML = '<div class="ticker-item">⚠️ Price feed unavailable</div>';
            console.error('Crypto API error:', error);
        }
    }

    // ==================== TIME & DATE ====================
    function updateTimeAndDate() {
        const now = new Date();
        
        // UTC Time
        const utcHours = now.getUTCHours().toString().padStart(2, '0');
        const utcMinutes = now.getUTCMinutes().toString().padStart(2, '0');
        const utcSeconds = now.getUTCSeconds().toString().padStart(2, '0');
        document.getElementById('utcTime').textContent = `${utcHours}:${utcMinutes}:${utcSeconds}`;
        
        // UTC+8 Time
        let utc8Hours = (now.getUTCHours() + 8) % 24;
        const utc8HoursStr = utc8Hours.toString().padStart(2, '0');
        document.getElementById('utc8Time').textContent = `${utc8HoursStr}:${utcMinutes}:${utcSeconds}`;
        
        // Local Date with weekday
        const weekdays = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        
        const weekdayName = weekdays[now.getDay()];
        const day = now.getDate();
        const monthName = months[now.getMonth()];
        const year = now.getFullYear();
        
        document.getElementById('localDate').textContent = `${weekdayName}, ${day} ${monthName} ${year}`;
    }

    // ==================== PAGE VIEW COUNTER ====================
    // Using CountAPI (free, no API key needed)
    async function updatePageCounter() {
        const counterElement = document.getElementById('counter');
        const pageId = 'surenbono_crypto_dashboard'; // Unique ID for this page
        
        try {
            // First, get current count
            const getResponse = await fetch(`https://api.countapi.xyz/get/${pageId}`);
            let data = await getResponse.json();
            
            if (data.value === undefined) {
                // If doesn't exist, create it with 1
                await fetch(`https://api.countapi.xyz/set/${pageId}?value=1`);
                counterElement.textContent = '1';
            } else {
                // Increment by 1
                const updateResponse = await fetch(`https://api.countapi.xyz/update/${pageId}?amount=1`);
                const updateData = await updateResponse.json();
                counterElement.textContent = updateData.value.toLocaleString();
            }
        } catch (error) {
            counterElement.textContent = '🔒 Private Mode';
            console.error('Counter error:', error);
        }
    }

    // ==================== INITIALIZE & AUTO REFRESH ====================
    fetchCryptoPrices();
    updateTimeAndDate();
    updatePageCounter();
    
    // Refresh crypto prices every 60 seconds
    setInterval(fetchCryptoPrices, 60000);
    // Refresh time every second
    setInterval(updateTimeAndDate, 1000);
</script>
</body>
</html>

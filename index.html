<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTO & FOREX DASHBOARD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Soft header */
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 10px;
        }

        .header h1 {
            color: #dddddd;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .header p {
            color: #888888;
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* Time row */
        .time-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .time-box {
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 8px 15px;
            text-align: center;
        }

        .time-label {
            color: #999999;
            font-size: 0.65rem;
            letter-spacing: 1px;
        }

        .time-value {
            color: #cccccc;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Courier New', monospace;
        }

        /* Forex section */
        .forex-section {
            background: #222222;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            margin-bottom: 20px;
            padding: 12px;
        }

        .forex-title {
            color: #aaaaaa;
            font-size: 0.7rem;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .forex-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 10px;
        }

        .forex-item {
            text-align: center;
            padding: 6px 12px;
            background: #2a2a2a;
            border-radius: 8px;
        }

        .forex-pair {
            color: #888888;
            font-size: 0.7rem;
        }

        .forex-rate {
            color: #7cb5ec;
            font-size: 1rem;
            font-weight: 600;
        }

        /* Crypto table - soft theme */
        .crypto-table {
            background: #222222;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .crypto-table th {
            color: #aaaaaa;
            background: #2a2a2a;
            padding: 12px 8px;
            font-size: 0.7rem;
            text-align: center;
            font-weight: 500;
            letter-spacing: 1px;
            border-bottom: 1px solid #3a3a3a;
        }

        .crypto-table td {
            padding: 10px 8px;
            font-size: 0.85rem;
            text-align: center;
            border-bottom: 1px solid #2e2e2e;
        }

        .symbol-cell {
            font-weight: 600;
            color: #dddddd;
            text-align: left;
        }

        .price-cell {
            font-weight: 500;
            text-align: right;
        }

        .price-down {
            color: #e06c75;
        }

        .price-up {
            color: #98c379;
        }

        .percent-down {
            color: #e06c75;
            text-align: right;
        }

        .percent-up {
            color: #98c379;
            text-align: right;
        }

        /* Link button */
        .link-button {
            display: block;
            text-align: center;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #bbbbbb;
            padding: 10px;
            text-decoration: none;
            font-size: 0.75rem;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        .link-button:hover {
            background: #333333;
            border-color: #5588aa;
            color: #dddddd;
        }

        /* Status */
        .status {
            text-align: center;
            color: #666666;
            font-size: 0.6rem;
        }

        .error-badge {
            text-align: center;
            color: #d19a66;
            font-size: 0.55rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⎛ ONCHAIN ATTENTION MACHINE ⎞</h1>
        <p>>_ CRYPTO + FOREX TERMINAL</p>
    </div>

    <!-- Time Row -->
    <div class="time-row">
        <div class="time-box"><div class="time-label">UTC</div><div class="time-value" id="utcTime">--:--:--</div></div>
        <div class="time-box"><div class="time-label">UTC+8</div><div class="time-value" id="utc8Time">--:--:--</div></div>
        <div class="time-box"><div class="time-label">DATE</div><div class="time-value" id="localDate">--</div></div>
    </div>

    <!-- Forex Section -->
    <div class="forex-section">
        <div class="forex-title">⟡ FOREX RATES ⟡</div>
        <div class="forex-grid">
            <div class="forex-item"><div class="forex-pair">USD/MYR</div><div class="forex-rate" id="usdmyr">---</div></div>
            <div class="forex-item"><div class="forex-pair">SGD/MYR</div><div class="forex-rate" id="sgdmyr">---</div></div>
            <div class="forex-item"><div class="forex-pair">MYR/THB</div><div class="forex-rate" id="myrthb">---</div></div>
            <div class="forex-item"><div class="forex-pair">MYR/CNY</div><div class="forex-rate" id="myrcny">---</div></div>
        </div>
    </div>

    <!-- Crypto Table -->
    <table class="crypto-table">
        <thead>
            <tr><th>SYMBOL</th><th>PRICE (USD)</th><th>24h %</th></tr>
        </thead>
        <tbody id="cryptoBody">
            <tr><td colspan="3" style="text-align:center; color:#888;">>_ LOADING...</td></tr>
        </tbody>
    </table>

    <!-- Collection Link -->
    <a href="https://collshp.com/n/srotogargees" target="_blank" class="link-button">◉ ENTER COLLECTION ◉</a>
    
    <div class="status">>_ UPDATES EVERY 60 SEC</div>
    <div class="error-badge" id="errorMsg"></div>
</div>

<script>
    const cryptos = [
        { id: 'bitcoin', symbol: 'BTC' },
        { id: 'ethereum', symbol: 'ETH' },
        { id: 'ripple', symbol: 'XRP' },
        { id: 'solana', symbol: 'SOL' },
        { id: 'cardano', symbol: 'ADA' },
        { id: 'the-open-network', symbol: 'TON' },
        { id: 'litecoin', symbol: 'LTC' },
        { id: 'tether-gold', symbol: 'XAUT' },
        { id: 'pi-network', symbol: 'PI' },
        { id: 'bitget-token', symbol: 'BGB' },
        { id: 'worldcoin-wld', symbol: 'WLD' },
        { id: 'notcoin', symbol: 'NOT' }
    ];

    let lastCryptoData = null;
    let lastForexData = null;
    let apiRetryCount = 0;

    async function fetchCrypto() {
        try {
            const ids = cryptos.map(c => c.id).join(',');
            const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('API returned ' + res.status);
            const data = await res.json();
            lastCryptoData = data;
            apiRetryCount = 0;
            document.getElementById('errorMsg').innerText = '';
            return data;
        } catch(e) {
            console.error('Crypto API error:', e);
            apiRetryCount++;
            if (apiRetryCount > 1) {
                document.getElementById('errorMsg').innerText = '⚠️ PRICE FEED DELAY - USING CACHED DATA ⚠️';
            }
            return lastCryptoData;
        }
    }

    async function fetchForex() {
        try {
            const url = 'https://api.exchangerate-api.com/v4/latest/MYR';
            const res = await fetch(url);
            if (!res.ok) throw new Error('Forex API error');
            const data = await res.json();
            const rates = {
                usdmyr: 1 / data.rates.USD,
                sgdmyr: 1 / data.rates.SGD,
                thb: data.rates.THB,
                cny: data.rates.CNY
            };
            lastForexData = rates;
            return rates;
        } catch(e) {
            console.error('Forex error:', e);
            return lastForexData || { usdmyr: '4.35', sgdmyr: '3.22', thb: '7.80', cny: '1.65' };
        }
    }

    async function updateCryptoPrices() {
        const data = await fetchCrypto();
        if (!data) return;
        
        for (let i = 0; i < cryptos.length; i++) {
            const coin = data[cryptos[i].id];
            if (!coin) continue;
            
            const price = coin.usd;
            const percent = coin.usd_24h_change || 0;
            const isDown = percent < 0;
            const percentSign = isDown ? '↓' : '↑';
            
            const row = document.getElementById('cryptoBody').children[i];
            if (row) {
                const priceCell = row.cells[1];
                priceCell.className = `price-cell ${isDown ? 'price-down' : 'price-up'}`;
                priceCell.innerText = `$${price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}`;
                
                const percentCell = row.cells[2];
                percentCell.className = isDown ? 'percent-down' : 'percent-up';
                percentCell.innerText = `${percentSign} ${Math.abs(percent).toFixed(2)}%`;
            }
        }
    }

    async function updateForexRates() {
        const rates = await fetchForex();
        document.getElementById('usdmyr').innerText = rates.usdmyr?.toFixed(4) || '4.3500';
        document.getElementById('sgdmyr').innerText = rates.sgdmyr?.toFixed(4) || '3.2200';
        document.getElementById('myrthb').innerText = rates.thb?.toFixed(4) || '7.8000';
        document.getElementById('myrcny').innerText = rates.cny?.toFixed(4) || '1.6500';
    }

    function buildTable() {
        const tbody = document.getElementById('cryptoBody');
        tbody.innerHTML = '';
        for (let c of cryptos) {
            const row = tbody.insertRow();
            row.insertCell(0).className = 'symbol-cell';
            row.cells[0].innerText = c.symbol;
            row.insertCell(1).className = 'price-cell';
            row.cells[1].innerText = '---';
            row.insertCell(2).className = 'percent-up';
            row.cells[2].innerText = '---';
        }
    }

    function updateTime() {
        const now = new Date();
        const utcH = now.getUTCHours().toString().padStart(2,'0');
        const utcM = now.getUTCMinutes().toString().padStart(2,'0');
        const utcS = now.getUTCSeconds().toString().padStart(2,'0');
        document.getElementById('utcTime').innerText = `${utcH}:${utcM}:${utcS}`;
        
        let utc8H = (now.getUTCHours() + 8) % 24;
        document.getElementById('utc8Time').innerText = `${utc8H.toString().padStart(2,'0')}:${utcM}:${utcS}`;
        
        const weekdays = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
        const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        document.getElementById('localDate').innerText = `${weekdays[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    }

    // Initialize
    buildTable();
    setTimeout(() => {
        updateCryptoPrices();
        updateForexRates();
    }, 100);
    updateTime();
    
    setInterval(updateTime, 1000);
    setInterval(() => {
        updateCryptoPrices();
        updateForexRates();
    }, 60000);
</script>
</body>
</html>
